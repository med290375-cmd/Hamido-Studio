<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamido Studio | Private Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --purple: #a855f7; --bg: #050505; --card-bg: #111; }
        * { box-sizing: border-box; transition: 0.3s ease; cursor: crosshair; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        #auth-ui { position: fixed; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: #080808; border: 1px solid #1a1a1a; padding: 50px; border-radius: 12px; text-align: center; width: 400px; }
        .logo-original { width: 180px; margin-bottom: 30px; border: 1px solid #333; }
        .btn-discord { background: #5865F2; color: white; text-decoration: none; padding: 15px; border-radius: 6px; font-weight: bold; display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 25px; text-transform: uppercase; }
        #main-site { display: none; padding-bottom: 50px; }
        header { padding: 100px 20px; text-align: center; background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, transparent 60%); }
        .user-tag { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--purple); display: flex; align-items: center; gap: 10px; z-index: 100; }
        .user-tag img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--purple); }
        .container { max-width: 1400px; margin: auto; padding: 0 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }
        .work-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1c; position: relative; }
        .work-card img { width: 100%; height: 260px; object-fit: cover; filter: brightness(0.9) contrast(1.1); image-rendering: -webkit-optimize-contrast; }
        .card-info { padding: 20px; border-top: 1px solid #1a1a1c; background: #0c0c0d; }
        .card-info h3 { margin: 0; font-size: 1rem; letter-spacing: 2px; color: #eee; text-transform: uppercase; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: 1px solid #222; border-radius: 6px; background: #16161a; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; font-size: 0.8rem; }
        .btn-comment { background: var(--purple); color: white; border-color: var(--purple); }
    </style>
</head>
